syntax = "proto3";
package v1;

option go_package = "gen/characters/pb";

// Service to manage characters
service CharactersService {
  rpc CharactersToLoginForAccount(CharactersToLoginForAccountRequest) returns (CharactersToLoginForAccountResponse);
  rpc CharactersToLoginByGUID(CharactersToLoginByGUIDRequest) returns (CharactersToLoginByGUIDResponse);

  rpc AccountDataForAccount(AccountDataForAccountRequest) returns (AccountDataForAccountResponse);
  rpc UpdateAccountDataForAccount(UpdateAccountDataForAccountRequest) returns (UpdateAccountDataForAccountResponse);

  rpc WhoQuery(WhoQueryRequest) returns (WhoQueryResponse);

  rpc CharacterOnlineByName(CharacterOnlineByNameRequest) returns (CharacterOnlineByNameResponse);
  rpc CharacterByName(CharacterByNameRequest) returns (CharacterByNameResponse);
  rpc CharacterByGUID(CharacterByGUIDRequest) returns (CharacterByGUIDResponse);

  rpc ShortOnlineCharactersDataByGUIDs(ShortCharactersDataByGUIDsRequest) returns (ShortCharactersDataByGUIDsResponse);
  rpc ArenaTeamQueueDataForRatedArena(ArenaTeamQueueDataForRatedArenaRequest) returns (ArenaTeamQueueDataForRatedArenaResponse);
  rpc GetArenaTeam(GetArenaTeamRequest) returns (GetArenaTeamResponse);
  rpc GetArenaTeamPetition(GetArenaTeamPetitionRequest) returns (GetArenaTeamPetitionResponse);
  rpc CreateArenaTeamFromPetition(CreateArenaTeamFromPetitionRequest) returns (CreateArenaTeamFromPetitionResponse);
  rpc InviteArenaTeamMember(InviteArenaTeamMemberRequest) returns (InviteArenaTeamMemberResponse);
  rpc AcceptArenaTeamInvite(AcceptArenaTeamInviteRequest) returns (AcceptArenaTeamInviteResponse);
  rpc DeclineArenaTeamInvite(DeclineArenaTeamInviteRequest) returns (ArenaTeamMutationResponse);
  rpc AddArenaTeamMember(AddArenaTeamMemberRequest) returns (ArenaTeamMutationResponse);
  rpc RemoveArenaTeamMember(RemoveArenaTeamMemberRequest) returns (ArenaTeamMutationResponse);
  rpc DisbandArenaTeam(DisbandArenaTeamRequest) returns (ArenaTeamMutationResponse);
  rpc SetArenaTeamCaptain(SetArenaTeamCaptainRequest) returns (ArenaTeamMutationResponse);
  rpc SetArenaTeamName(SetArenaTeamNameRequest) returns (ArenaTeamMutationResponse);
  rpc SaveArenaTeamStats(SaveArenaTeamStatsRequest) returns (ArenaTeamMutationResponse);
  rpc DeleteAllArenaTeams(DeleteAllArenaTeamsRequest) returns (ArenaTeamMutationResponse);
  rpc ValidateArenaTeamCharacterDelete(ValidateArenaTeamCharacterDeleteRequest) returns (ArenaTeamMutationResponse);
  rpc RemovePlayerFromArenaTeams(RemovePlayerFromArenaTeamsRequest) returns (ArenaTeamMutationResponse);

  // Would effect only offline player.
  rpc SavePlayerPosition(SavePlayerPositionRequest) returns (SavePlayerPositionResponse);
  rpc RecordLfgDungeonRoute(RecordLfgDungeonRouteRequest) returns (RecordLfgDungeonRouteResponse);
  rpc ConfirmLfgDungeonRouteEntered(ConfirmLfgDungeonRouteEnteredRequest) returns (ConfirmLfgDungeonRouteEnteredResponse);
  rpc ClearUnboundLfgDungeonRoute(ClearUnboundLfgDungeonRouteRequest) returns (ClearUnboundLfgDungeonRouteResponse);
  rpc GetLfgDungeonRoute(GetLfgDungeonRouteRequest) returns (GetLfgDungeonRouteResponse);

  // Friends and ignore list management
  rpc GetFriendsList(GetFriendsListRequest) returns (GetFriendsListResponse);
  rpc AddFriend(AddFriendRequest) returns (AddFriendResponse);
  rpc AddRealIDFriendByEmail(AddRealIDFriendByEmailRequest) returns (AddRealIDFriendByEmailResponse);
  rpc AcceptRealIDFriend(AcceptRealIDFriendRequest) returns (AcceptRealIDFriendResponse);
  rpc AreRealIDFriends(AreRealIDFriendsRequest) returns (AreRealIDFriendsResponse);
  rpc RemoveFriend(RemoveFriendRequest) returns (RemoveFriendResponse);
  rpc SetFriendNote(SetFriendNoteRequest) returns (SetFriendNoteResponse);
  rpc AddIgnore(AddIgnoreRequest) returns (AddIgnoreResponse);
  rpc RemoveIgnore(RemoveIgnoreRequest) returns (RemoveIgnoreResponse);
  rpc NotifyStatusChange(NotifyStatusChangeRequest) returns (NotifyStatusChangeResponse);

  // Get all online character GUIDs for a realm
  rpc GetOnlineCharacters(GetOnlineCharactersRequest) returns (GetOnlineCharactersResponse);
}

// LogInCharacter is character that should be displayed on log in screen
message LogInCharacter {
  uint64 GUID = 1;
  string name = 2;
  uint32 race = 3;
  uint32 class = 4;
  uint32 gender = 5;
  uint32 skin = 6;
  uint32 face = 7;
  uint32 hairStyle = 8;
  uint32 hairColor = 9;
  uint32 facialStyle = 10;
  uint32 level = 11;
  uint32 zone = 12;
  uint32 map = 13;
  float positionX = 14;
  float positionY = 15;
  float positionZ = 16;
  uint32 guildID = 17;
  uint32 playerFlags = 18;
  uint32 atLogin = 19;
  uint32 petEntry = 20;
  uint32 petModelID = 21;
  uint32 petLevel = 22;
  bool banned = 23;
  repeated EquipmentDisplay equipments = 24;
  uint32 accountID = 25;
  uint32 extraFlags = 26;
}

message EquipmentDisplay {
  uint32 DisplayInfoID = 1;
  uint32 InventoryType = 2;
  uint32 EnchantmentID = 3;
}

message CharactersToLoginForAccountRequest{

  string api = 1;

  uint32 accountID = 2;
  uint32 realmID = 3;
}

// Response that contains list of characters for given account
message CharactersToLoginForAccountResponse{
  string api = 1;

  repeated LogInCharacter characters = 2;
}

message CharactersToLoginByGUIDRequest{
  string api = 1;

  uint64 characterGUID = 2;
  uint32 realmID = 3;
  uint32 accountID = 4;
}

// Response that contains character to login
message CharactersToLoginByGUIDResponse{
  string api = 1;

  LogInCharacter character = 2;
}


message AccountDataForAccountRequest{
  string api = 1;

  uint32 accountID = 2;
  uint32 realmID = 3;
}

message AccountData {
  uint32 type = 1;
  int64 time = 2;
  string data = 3;
}

message AccountDataForAccountResponse{
  string api = 1;

  repeated AccountData accountData = 2;
}

message UpdateAccountDataForAccountRequest{
  string api = 1;

  uint32 accountID = 2;
  uint32 realmID = 3;
  uint32 type = 4;
  int64 time = 5;
  string data = 6;
}

message UpdateAccountDataForAccountResponse{
  string api = 1;
}

message WhoQueryRequest{
  string api = 1;

  uint64 characterGUID = 2;
  uint32 realmID = 3;
  uint32 lvlMin = 4;
  uint32 lvlMax = 5;

  string playerName = 6;
  string guildName = 7;

  uint32 raceMask = 8;
  uint32 classMask = 9;

  repeated uint32 zones = 10;

  repeated string strings = 11;
}

message WhoQueryResponse{
  string api = 1;

  uint32 totalFound = 2;
  message WhoItem {
    uint64 guid = 1;
    string name = 2;
    string guild = 3;
    uint32 lvl = 4;
    uint32 class = 5;
    uint32 race = 6;
    uint32 gender = 7;
    uint32 zoneID = 8;
  };
  repeated WhoItem itemsToDisplay = 3;
}

message CharacterOnlineByNameRequest {
  string api = 1;

  uint32 realmID = 2;
  string characterName = 3;
}

message CharacterOnlineByNameResponse {
  string api = 1;

  message Char {
    uint32 realmID = 1;
    string gatewayID = 2;
    uint64 charGUID = 3;
    string charName = 4;
    uint32 charRace = 5;
    uint32 charClass = 6;
    uint32 charGender = 7;
    uint32 charLvl = 8;
    uint32 charZone = 9;
    uint32 charMap = 10;
    uint64 charGuildID = 11;
    uint32 accountID = 12;
  }
  Char character = 2;
}

message CharacterByNameRequest {
  string api = 1;

  uint32 realmID = 2;
  string characterName = 3;
}

message CharacterByNameResponse {
  string api = 1;

  message Char {
    uint32 realmID = 1;
    bool isOnline = 2;
    string gatewayID = 3;
    uint64 charGUID = 4;
    string charName = 5;
    uint32 charRace = 6;
    uint32 charClass = 7;
    uint32 charGender = 8;
    uint32 charLvl = 9;
    uint32 charZone = 10;
    uint32 charMap = 11;
    uint64 charGuildID = 12;
    uint32 accountID = 13;
  }
  Char character = 2;
}

message CharacterByGUIDRequest {
  string api = 1;

  uint32 realmID = 2;
  uint64 characterGUID = 3;
}

message CharacterByGUIDResponse {
  string api = 1;

  CharacterByNameResponse.Char character = 2;
}

message ShortCharactersDataByGUIDsRequest {
  string api = 1;

  uint32 realmID = 2;
  repeated uint64 GUIDs = 3;
}

message ShortCharactersDataByGUIDsResponse {
  string api = 1;

  message ShortCharData {
    uint32 realmID = 1;
    bool isOnline = 2;
    string gatewayID = 3;
    uint64 charGUID = 4;
    string charName = 5;
    uint32 charRace = 6;
    uint32 charClass = 7;
    uint32 charGender = 8;
    uint32 charLvl = 9;
    uint32 charZone = 10;
    uint32 charMap = 11;
    uint64 charGuildID = 12;
    uint32 accountID = 13;
  }

  repeated ShortCharData characters = 2;
}

message ArenaTeamQueueDataForRatedArenaRequest {
  string api = 1;

  uint32 realmID = 2;
  uint64 leaderGUID = 3;
  repeated uint64 playerGUIDs = 4;
  uint32 arenaType = 5;
  uint32 startMatchmakerRating = 6;
}

message ArenaTeamQueueDataForRatedArenaResponse {
  string api = 1;

  enum Status {
    Ok = 0;
    NotFound = 1;
    MemberMismatch = 2;
    InvalidPartySize = 3;
    Failed = 4;
    InvalidType = 5;
  }

  Status status = 2;
  uint32 arenaTeamID = 3;
  uint32 teamRating = 4;
  uint32 matchmakerRating = 5;
  uint32 previousOpponentsTeamID = 6;
}

message CreateArenaTeamFromPetitionRequest {
  string api = 1;

  uint32 realmID = 2;
  uint64 captainGUID = 3;
  uint64 petitionGUID = 4;
  uint32 arenaType = 5;
  uint32 backgroundColor = 6;
  uint32 emblemStyle = 7;
  uint32 emblemColor = 8;
  uint32 borderStyle = 9;
  uint32 borderColor = 10;
  uint32 startRating = 11;
  uint32 startPersonalRating = 12;
  uint32 startMatchmakerRating = 13;
}

message CreateArenaTeamFromPetitionResponse {
  string api = 1;

  enum Status {
    Ok = 0;
    NotFound = 1;
    NotOwner = 2;
    InvalidType = 3;
    NameExists = 4;
    AlreadyInTeam = 5;
    NotEnoughSignatures = 6;
    Failed = 7;
    InvalidName = 8;
  }

  Status status = 2;
  uint32 arenaTeamID = 3;
}

enum ArenaTeamMutationStatus {
  ARENA_TEAM_MUTATION_OK = 0;
  ARENA_TEAM_MUTATION_NOT_FOUND = 1;
  ARENA_TEAM_MUTATION_MEMBER_MISMATCH = 2;
  ARENA_TEAM_MUTATION_INVALID_TYPE = 3;
  ARENA_TEAM_MUTATION_NAME_EXISTS = 4;
  ARENA_TEAM_MUTATION_ALREADY_IN_TEAM = 5;
  ARENA_TEAM_MUTATION_ROSTER_FULL = 6;
  ARENA_TEAM_MUTATION_FAILED = 7;
  ARENA_TEAM_MUTATION_INVALID_NAME = 8;
  ARENA_TEAM_MUTATION_PERMISSION_DENIED = 9;
  ARENA_TEAM_MUTATION_LEADER_LEAVE = 10;
  ARENA_TEAM_MUTATION_ALREADY_INVITED = 11;
  ARENA_TEAM_MUTATION_IGNORING_YOU = 12;
}

message ArenaTeamMemberData {
  uint64 playerGUID = 1;
  string name = 2;
  bool online = 3;
  uint32 level = 4;
  uint32 class = 5;
  uint32 weekGames = 6;
  uint32 weekWins = 7;
  uint32 seasonGames = 8;
  uint32 seasonWins = 9;
  uint32 personalRating = 10;
  uint32 matchmakerRating = 11;
  uint32 maxMMR = 12;
}

message ArenaTeamData {
  uint32 arenaTeamID = 1;
  string name = 2;
  uint64 captainGUID = 3;
  uint32 type = 4;
  uint32 rating = 5;
  uint32 weekGames = 6;
  uint32 weekWins = 7;
  uint32 seasonGames = 8;
  uint32 seasonWins = 9;
  uint32 rank = 10;
  uint32 backgroundColor = 11;
  uint32 emblemStyle = 12;
  uint32 emblemColor = 13;
  uint32 borderStyle = 14;
  uint32 borderColor = 15;
  repeated ArenaTeamMemberData members = 16;
}

message GetArenaTeamRequest {
  string api = 1;

  uint32 realmID = 2;
  uint32 arenaTeamID = 3;
}

message GetArenaTeamResponse {
  string api = 1;

  enum Status {
    Ok = 0;
    NotFound = 1;
    Failed = 2;
  }

  Status status = 2;
  ArenaTeamData team = 3;
}

message ArenaTeamPetitionData {
  uint64 petitionGUID = 1;
  uint32 petitionID = 2;
  uint64 ownerGUID = 3;
  string name = 4;
  uint32 arenaType = 5;
  uint32 signatures = 6;
}

message GetArenaTeamPetitionRequest {
  string api = 1;

  uint32 realmID = 2;
  uint64 petitionGUID = 3;
}

message GetArenaTeamPetitionResponse {
  string api = 1;

  enum Status {
    Ok = 0;
    NotFound = 1;
    NotArena = 2;
    Failed = 3;
  }

  Status status = 2;
  ArenaTeamPetitionData petition = 3;
}

message InviteArenaTeamMemberRequest {
  string api = 1;

  uint32 realmID = 2;
  uint32 arenaTeamID = 3;
  uint64 inviterGUID = 4;
  string inviterName = 5;
  uint64 targetGUID = 6;
  string targetName = 7;
}

message InviteArenaTeamMemberResponse {
  string api = 1;
  ArenaTeamMutationStatus status = 2;
  ArenaTeamData team = 3;
}

message AcceptArenaTeamInviteRequest {
  string api = 1;

  uint32 realmID = 2;
  uint64 playerGUID = 3;
  string playerName = 4;
  uint32 personalRating = 5;
}

message AcceptArenaTeamInviteResponse {
  string api = 1;
  ArenaTeamMutationStatus status = 2;
  ArenaTeamData team = 3;
}

message DeclineArenaTeamInviteRequest {
  string api = 1;

  uint32 realmID = 2;
  uint64 playerGUID = 3;
}

message AddArenaTeamMemberRequest {
  string api = 1;

  uint32 realmID = 2;
  uint32 arenaTeamID = 3;
  uint64 playerGUID = 4;
  uint32 personalRating = 5;
}

message RemoveArenaTeamMemberRequest {
  string api = 1;

  uint32 realmID = 2;
  uint32 arenaTeamID = 3;
  uint64 playerGUID = 4;
  uint64 actorGUID = 5;
}

message DisbandArenaTeamRequest {
  string api = 1;

  uint32 realmID = 2;
  uint32 arenaTeamID = 3;
  uint64 actorGUID = 4;
}

message SetArenaTeamCaptainRequest {
  string api = 1;

  uint32 realmID = 2;
  uint32 arenaTeamID = 3;
  uint64 captainGUID = 4;
  uint64 actorGUID = 5;
}

message SetArenaTeamNameRequest {
  string api = 1;

  uint32 realmID = 2;
  uint32 arenaTeamID = 3;
  string name = 4;
  uint64 actorGUID = 5;
}

message ArenaTeamStatsMember {
  uint64 playerGUID = 1;
  uint32 personalRating = 2;
  uint32 weekGames = 3;
  uint32 weekWins = 4;
  uint32 seasonGames = 5;
  uint32 seasonWins = 6;
  uint32 matchmakerRating = 7;
  uint32 maxMMR = 8;
  bool saveArenaStats = 9;
}

message SaveArenaTeamStatsRequest {
  string api = 1;

  uint32 realmID = 2;
  uint32 arenaTeamID = 3;
  uint32 rating = 4;
  uint32 weekGames = 5;
  uint32 weekWins = 6;
  uint32 seasonGames = 7;
  uint32 seasonWins = 8;
  uint32 rank = 9;
  uint32 slot = 10;
  repeated ArenaTeamStatsMember members = 11;
}

message DeleteAllArenaTeamsRequest {
  string api = 1;

  uint32 realmID = 2;
}

message ValidateArenaTeamCharacterDeleteRequest {
  string api = 1;

  uint32 realmID = 2;
  uint64 playerGUID = 3;
}

message RemovePlayerFromArenaTeamsRequest {
  string api = 1;

  uint32 realmID = 2;
  uint64 playerGUID = 3;
}

message ArenaTeamMutationResponse {
  string api = 1;
  ArenaTeamMutationStatus status = 2;
}

message SavePlayerPositionRequest {
  string api = 1;

  uint32 realmID = 2;
  uint64 charGUID = 3;

  uint32 mapID = 4;
  float x = 5;
  float y = 6;
  float z = 7;
  float o = 8;
}

message SavePlayerPositionResponse {
  string api = 1;
}

message LfgDungeonRoute {
  uint32 realmID = 1;
  uint64 playerGUID = 2;
  uint32 dungeonEntry = 3;
  uint32 mapID = 4;
  uint32 difficulty = 5;
  uint32 ownerRealmID = 6;
  bool isCrossRealm = 7;
  bool requiresBoundInstance = 8;
  uint32 instanceID = 9;
  uint32 boundInstanceID = 10;
}

message RecordLfgDungeonRouteRequest {
  string api = 1;
  LfgDungeonRoute route = 2;
}

message RecordLfgDungeonRouteResponse {
  string api = 1;
}

message ConfirmLfgDungeonRouteEnteredRequest {
  string api = 1;
  uint32 realmID = 2;
  uint64 playerGUID = 3;
  uint32 mapID = 4;
  uint32 difficulty = 5;
  uint32 instanceID = 6;
}

message ConfirmLfgDungeonRouteEnteredResponse {
  string api = 1;
  LfgDungeonRoute route = 2;
}

message ClearUnboundLfgDungeonRouteRequest {
  string api = 1;
  uint32 realmID = 2;
  uint64 playerGUID = 3;
  uint32 mapID = 4;
}

message ClearUnboundLfgDungeonRouteResponse {
  string api = 1;
}

message GetLfgDungeonRouteRequest {
  string api = 1;
  uint32 realmID = 2;
  uint64 playerGUID = 3;
  uint32 mapID = 4;
}

message GetLfgDungeonRouteResponse {
  string api = 1;
  bool found = 2;
  bool available = 3;
  LfgDungeonRoute route = 4;
}

// Friends list requests and responses

message GetFriendsListRequest {
  string api = 1;
  uint32 realmID = 2;
  uint64 playerGUID = 3;
}

message GetFriendsListResponse {
  string api = 1;

  message Friend {
    uint64 guid = 1;
    string note = 2;
    uint32 status = 3;  // 0 = offline, 1 = online
    uint32 area = 4;    // zone ID if online
    uint32 level = 5;
    uint32 classID = 6;
    uint32 realmID = 7;
  }

  message IgnoredPlayer {
    uint64 guid = 1;
  }

  repeated Friend friends = 2;
  repeated IgnoredPlayer ignored = 3;
}

message AddFriendRequest {
  string api = 1;
  uint32 realmID = 2;
  uint64 playerGUID = 3;
  uint64 friendGUID = 4;
  string friendName = 5;
  string note = 6;
}

message AddFriendResponse {
  string api = 1;
  uint32 result = 2;  // FriendsResult enum value
  uint32 status = 3;  // 0=offline, 1=online
  uint32 area = 4;
  uint32 level = 5;
  uint32 classID = 6;
  uint64 friendGUID = 7;
  bool pending = 8;
  bool accepted = 9;
}

message AddRealIDFriendByEmailRequest {
  string api = 1;
  uint32 realmID = 2;
  uint64 playerGUID = 3;
  uint32 accountID = 4;
  string email = 5;
  string note = 6;
}

message AddRealIDFriendByEmailResponse {
  string api = 1;
  uint32 result = 2;  // FriendsResult enum value
  uint32 status = 3;  // 0=offline, 1=online
  uint32 area = 4;
  uint32 level = 5;
  uint32 classID = 6;
  uint64 friendGUID = 7;
  bool pending = 8;
  bool accepted = 9;
}

message AcceptRealIDFriendRequest {
  string api = 1;
  uint32 realmID = 2;
  uint64 playerGUID = 3;
  uint32 accountID = 4;
  uint32 requesterAccountID = 5;
  string note = 6;
}

message AcceptRealIDFriendResponse {
  string api = 1;
  uint32 result = 2;  // FriendsResult enum value
  uint32 status = 3;  // 0=offline, 1=online
  uint32 area = 4;
  uint32 level = 5;
  uint32 classID = 6;
  uint64 friendGUID = 7;
  bool pending = 8;
  bool accepted = 9;
}

message AreRealIDFriendsRequest {
  string api = 1;
  uint32 accountID = 2;
  uint32 friendAccountID = 3;
}

message AreRealIDFriendsResponse {
  string api = 1;
  bool accepted = 2;
}

message RemoveFriendRequest {
  string api = 1;
  uint32 realmID = 2;
  uint64 playerGUID = 3;
  uint64 friendGUID = 4;
}

message RemoveFriendResponse {
  string api = 1;
}

message SetFriendNoteRequest {
  string api = 1;
  uint32 realmID = 2;
  uint64 playerGUID = 3;
  uint64 friendGUID = 4;
  string note = 5;
}

message SetFriendNoteResponse {
  string api = 1;
}

message AddIgnoreRequest {
  string api = 1;
  uint32 realmID = 2;
  uint64 playerGUID = 3;
  uint64 ignoredGUID = 4;
}

message AddIgnoreResponse {
  string api = 1;
  uint32 result = 2;  // FriendsResult enum value
}

message RemoveIgnoreRequest {
  string api = 1;
  uint32 realmID = 2;
  uint64 playerGUID = 3;
  uint64 ignoredGUID = 4;
}

message RemoveIgnoreResponse {
  string api = 1;
}

message NotifyStatusChangeRequest {
  string api = 1;
  uint32 realmID = 2;
  uint64 playerGUID = 3;
  uint32 status = 4;  // 0=offline, 1=online
  uint32 area = 5;
  uint32 level = 6;
  uint32 classID = 7;
}

message NotifyStatusChangeResponse {
  string api = 1;
}

message GetOnlineCharactersRequest {
  string api = 1;
  uint32 realmID = 2;
}

message GetOnlineCharactersResponse {
  string api = 1;
  repeated uint64 characterGUIDs = 2;
  uint32 totalCount = 3;
}
