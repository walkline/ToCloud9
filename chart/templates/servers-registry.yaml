apiVersion: apps/v1
kind: Deployment
metadata: {{ $fullname := printf "%s-%s" .Release.Name .Chart.Name | trunc 63 | trimSuffix "-" }}
  name: {{ $fullname }}-servers-registry
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}"
spec:
  selector:
    matchLabels:
      app: {{ $fullname }}-servers-registry
  replicas: {{ default 1 .Values.servers_registry.replicaCount | int }}
  template:
    metadata:
      labels:
        app: {{ $fullname }}-servers-registry
    spec:
      {{- if and .Values.servers_registry.layering.enableKubernetesAutoscaling (eq .Values.servers_registry.layering.provisioner.type "kubernetes") }}
      serviceAccountName: {{ $fullname }}-layer-controller
      {{- end }}
      containers:
      - name: {{ .Release.Name }}-servers-registry
        image: "{{ .Values.servers_registry.image.repository }}:{{ .Values.servers_registry.image.tag }}"
        imagePullPolicy: {{ .Values.servers_registry.image.pullPolicy | toString }}
        env:
        - name: PORT
          value: "{{ .Values.servers_registry.service.internalPort | int }}"
        - name: REDIS_URL
          value: redis://{{ .Release.Name }}-redis-headless:6379/0
        - name: NATS_URL
          value: nats://{{ .Release.Name }}-nats:4222
        - name: LAYERING_ENABLED
          value: "{{ .Values.servers_registry.layering.enabled }}"
        - name: LAYER_ENABLE_KUBERNETES_AUTOSCALING
          value: "{{ .Values.servers_registry.layering.enableKubernetesAutoscaling }}"
        - name: LAYER_MAPS
          value: "{{- range $i, $item := .Values.servers_registry.layering.maps }}{{ if $i }},{{ end }}{{ $item.mapID }}:{{ $item.layers }}{{- end }}"
        - name: LAYER_MAX_POPULATION
          value: "{{ .Values.servers_registry.layering.maxPopulation }}"
        - name: LAYER_TARGET_POPULATION_PERCENT
          value: "{{ .Values.servers_registry.layering.targetPopulationPercent }}"
        - name: LAYER_OVERFLOW_MARGIN_PERCENT
          value: "{{ .Values.servers_registry.layering.overflowMarginPercent }}"
        - name: LAYER_MIN_CAPACITY_PERCENT
          value: "{{ .Values.servers_registry.layering.minCapacityPercent }}"
        - name: LAYER_MIN_CAPACITY_DURATION_SECONDS
          value: "{{ .Values.servers_registry.layering.minCapacityDurationSeconds }}"
        - name: LAYER_SWITCH_COOLDOWN_SECONDS
          value: "{{ .Values.servers_registry.layering.switchCooldownSeconds }}"
        - name: LAYER_MAX_SWITCHES_PER_HOUR
          value: "{{ .Values.servers_registry.layering.maxSwitchesPerHour }}"
        - name: LAYER_MIN_LAYERS
          value: "{{ .Values.servers_registry.layering.minLayers }}"
        - name: LAYER_MAX_LAYERS
          value: "{{ .Values.servers_registry.layering.maxLayers }}"
        - name: LAYER_RECONCILE_INTERVAL_SECONDS
          value: "{{ .Values.servers_registry.layering.reconcileIntervalSeconds }}"
        - name: LAYER_SCOPE_MAP_IDS
          value: "{{ join "," .Values.servers_registry.layering.scopeMapIDs }}"
        - name: LAYER_SCOPE_ZONE_IDS
          value: "{{ join "," .Values.servers_registry.layering.scopeZoneIDs }}"
        - name: LAYER_SCOPE_MAX_POPULATION
          value: "{{ .Values.servers_registry.layering.scopeMaxPopulation }}"
        - name: LAYER_PROVISIONER_TYPE
          value: "{{ .Values.servers_registry.layering.provisioner.type }}"
        - name: LAYER_KUBERNETES_NAMESPACE
          value: "{{ default .Release.Namespace .Values.servers_registry.layering.provisioner.namespace }}"
        - name: LAYER_DEPLOYMENT_PREFIX
          value: "{{ .Values.servers_registry.layering.provisioner.namePrefix }}"
        - name: LAYER_BASE_DEPLOYMENTS
          value: "{{ if .Values.servers_registry.layering.provisioner.baseDeployments }}{{ join "," .Values.servers_registry.layering.provisioner.baseDeployments }}{{ else }}{{ $fullname }}-gameserver-ac{{ end }}"
        ports:
        - containerPort: {{ .Values.servers_registry.service.internalPort | int  }}
        # livenessProbe:
        #   httpGet:
        #     path: /healthcheck
        #     port: {{ .Values.servers_registry.service.internalPort | int }}
        # readinessProbe:
        #   httpGet:
        #     path: /healthcheck
        #     port: {{ .Values.servers_registry.service.internalPort | int }}
        securityContext:
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
          # runAsNonRoot: true
          allowPrivilegeEscalation: false
        resources:
{{ toYaml .Values.resources | indent 10 }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-servers-registry
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}"
spec:
  type: {{ .Values.servers_registry.service.type }}
  ports:
  - port: {{ .Values.servers_registry.service.externalPort | int  }}
    targetPort: {{ .Values.servers_registry.service.internalPort | int  }}
    protocol: TCP
  selector:
    app: {{ $fullname }}-servers-registry

{{- if and .Values.servers_registry.layering.enableKubernetesAutoscaling (eq .Values.servers_registry.layering.provisioner.type "kubernetes") }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $fullname }}-layer-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullname }}-layer-controller
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullname }}-layer-controller
subjects:
- kind: ServiceAccount
  name: {{ $fullname }}-layer-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullname }}-layer-controller
{{- end }}
