# Default values for tocloud9.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
tc9ImagesTag: &defaultImagesTag "v0.0.4"

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
nats:
  enabled: true
mysql:
  enabled: true
  global:
    storageClass: standard
  initdbScriptsConfigMap: mysql-init-scripts
  primary:
    # Had some issues with restarts, so disabled these for now.
    livenessProbe:
      enabled: false
    readinessProbe:
      enabled: false
    startupProbe:
      enabled: false

databases:
  db_schema_type: ac # ac / tc
  db_user: acore
  db_password: acore
  db_auth_name: acore_auth
  db_characters_name: acore_characters
  db_world_name: acore_world
  # External DB hostname is optional field to use external database,
  # will use credentials and databases names from above to build connection string.
  # Don't forget to disable mysql with mysql.enabled=false.
  external_db_hostname: ""
  external_db_port: "3306"

servers_registry:
  replicaCount: 1
  image:
    repository: ghcr.io/walkline/servers-registry
    pullPolicy: Always
    tag: *defaultImagesTag
  service:
    type: ClusterIP
    internalPort: 8999
    externalPort: 8999
  layering:
    enabled: false
    maxPopulation: 1000
    # Normal placement stops at this percentage and starts another layer.
    targetPopulationPercent: 90
    # Temporary hard-cap headroom, primarily for party reunification and while
    # a newly requested layer is still starting.
    overflowMarginPercent: 10
    # A non-base layer at or below this percentage for this long is drained.
    # Draining never force-moves players; deletion waits for natural exits.
    minCapacityPercent: 10
    minCapacityDurationSeconds: 300
    switchCooldownSeconds: 60
    maxSwitchesPerHour: 6
    minLayers: 1
    maxLayers: 10
    reconcileIntervalSeconds: 5
    # Empty lists apply the threshold realm-wide. Put starting-area zone IDs
    # here to scale from the busiest configured area instead.
    scopeMapIDs: []
    scopeZoneIDs: []
    scopeMaxPopulation: 0
    provisioner:
      type: none # none / kubernetes
      namespace: "" # empty uses the release namespace
      namePrefix: tc9
      # Base deployments are cloned once for every additional layer. Empty
      # defaults to this chart's gameserver-ac deployment.
      baseDeployments: []

authserver:
  replicaCount: 1
  image:
    repository: ghcr.io/walkline/authserver
    pullPolicy: Always
    tag: *defaultImagesTag
  service:
    type: NodePort
    internalPort: 3724
    externalPort: 32767

guildserver:
  replicaCount: 1
  image:
    repository: ghcr.io/walkline/guildserver
    pullPolicy: Always
    tag: *defaultImagesTag
  service:
    type: ClusterIP
    internalPort: 8995
    externalPort: 8995

guidserver:
  replicaCount: 1
  image:
    repository: ghcr.io/walkline/guidserver
    pullPolicy: Always
    tag: *defaultImagesTag
  service:
    type: ClusterIP
    internalPort: 8996
    externalPort: 8996

chatserver:
  replicaCount: 1
  image:
    repository: ghcr.io/walkline/chatserver
    pullPolicy: Always
    tag: *defaultImagesTag
  service:
    type: ClusterIP
    internalPort: 8992
    externalPort: 8992

charserver:
  replicaCount: 1
  image:
    repository: ghcr.io/walkline/charserver
    pullPolicy: Always
    tag: *defaultImagesTag
  service:
    type: ClusterIP
    internalPort: 8087
    externalPort: 8087

groupserver:
  replicaCount: 1
  image:
    repository: ghcr.io/walkline/groupserver
    pullPolicy: Always
    tag: *defaultImagesTag
  service:
    type: ClusterIP
    internalPort: 8998
    externalPort: 8998

mailserver:
  replicaCount: 1
  image:
    repository: ghcr.io/walkline/mailserver
    pullPolicy: Always
    tag: *defaultImagesTag
  service:
    type: ClusterIP
    internalPort: 8997
    externalPort: 8997

auctionhouse:
  replicaCount: 2
  image:
    repository: ghcr.io/walkline/auctionhouse
    pullPolicy: Always
    tag: *defaultImagesTag
  service:
    type: ClusterIP
    internalPort: 8993
    externalPort: 8993

matchmakingserver:
  replicaCount: 1
  image:
    repository: ghcr.io/walkline/matchmakingserver
    pullPolicy: Always
    tag: *defaultImagesTag
  service:
    type: ClusterIP
    internalPort: 8994
    externalPort: 8994

gateway:
  replicaCount: 3
  # IP or domain to access this gateway.
  # If empty - uses node IP.
  hostname: ""
  # External and internal ports should be the same, so using single value here.
  port: 32766
  image:
    repository: ghcr.io/walkline/gateway
    pullPolicy: Always
    tag: *defaultImagesTag
  service:
    type: NodePort
  layering:
    enabled: false
    switchQueueSize: 32
    queueProcessIntervalMs: 250

gameserver_ac:
  initcontainer:
    # If true - downloads assets and unzip them if pvc is empty.
    download_enabled: true
    download_url: "https://github.com/wowgaming/client-data/releases/download/v16/data.zip"
    image:
      repository: alpine
      pullPolicy: IfNotPresent
      tag: "latest"
  replicaCount: 1
  storageClass: my-storage-class
  port_soap: 7878
  port_telnet: 3443
  port_world: 9601
  port_health: 9604
  image:
    repository: ghcr.io/walkline/gameserver-ac
    pullPolicy: Always
    tag: *defaultImagesTag
  service:
    type: ClusterIP
    internalPort: 9509
    externalPort: 9509
  # Replicas with the same ID split maps inside one logical layer. Deploy a
  # separate gameserver workload with another ID for an additional layer.
  layerId: 1
